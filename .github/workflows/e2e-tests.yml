name: E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      environment:
        description: 'Environment to test against'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}

    - name: Create test environment file
      run: |
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://demo-ecommerce.com' }}" >> .env
        echo "TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL || 'test@example.com' }}" >> .env
        echo "TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD || 'TestPassword123!' }}" >> .env
        echo "HEADLESS=true" >> .env

    - name: Run E2E tests
      run: npx playwright test --project=${{ matrix.browser }} --shard=${{ matrix.shard }}/4
      env:
        CI: true

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}-${{ matrix.shard }}
        path: |
          test-results/
          playwright-report/
        retention-days: 30

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: html-report-${{ matrix.browser }}-${{ matrix.shard }}
        path: test-results/html-report/
        retention-days: 30

  visual-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Create test environment file
      run: |
        echo "BASE_URL=${{ secrets.BASE_URL || 'https://demo-ecommerce.com' }}" >> .env
        echo "HEADLESS=true" >> .env

    - name: Run visual regression tests
      run: npm run test:visual

    - name: Upload visual test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: visual-test-results
        path: test-results/
        retention-days: 30

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts

    - name: Merge HTML reports
      run: |
        mkdir -p merged-report
        npx playwright merge-reports --reporter html all-artifacts/playwright-report-*/
      continue-on-error: true

    - name: Upload merged report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: merged-html-report
        path: merged-report/
        retention-days: 30

    - name: Deploy report to GitHub Pages
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: merged-report
        destination_dir: test-reports/${{ github.run_number }}

  notify:
    if: always()
    needs: [test, visual-tests]
    runs-on: ubuntu-latest
    steps:
    - name: Notify on success
      if: needs.test.result == 'success' && needs.visual-tests.result == 'success'
      run: |
        echo "✅ All E2E tests passed successfully!"
        
    - name: Notify on failure
      if: needs.test.result == 'failure' || needs.visual-tests.result == 'failure'
      run: |
        echo "❌ E2E tests failed. Check the reports for details."
        exit 1